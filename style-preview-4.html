<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Style Preview 4 — Тёплый уютный</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #3d2c20;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 230, 184, .95), transparent 32%),
        radial-gradient(circle at 88% 88%, rgba(91, 124, 91, .32), transparent 30%),
        linear-gradient(135deg, #f4ead9, #d8b995);
      display: grid;
      place-items: center;
      padding: 32px;
    }
    .wrap {
      width: min(760px, 100%);
      background: rgba(255, 250, 241, .88);
      border: 1px solid rgba(116, 84, 58, .22);
      border-radius: 32px;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(80, 52, 32, .18);
    }
    .inner {
      border: 1px dashed rgba(116, 84, 58, .32);
      border-radius: 24px;
      padding: 34px;
    }
    .brand { display: flex; align-items: center; gap: 10px; color: #5b7c5b; font-weight: 800; }
    .bean { width: 34px; height: 34px; border-radius: 50%; background: #6d432c; position: relative; box-shadow: inset -6px -3px 0 rgba(0,0,0,.12); }
    .bean:after { content: ''; position: absolute; top: 7px; bottom: 7px; left: 16px; width: 2px; background: rgba(255,255,255,.28); transform: rotate(18deg); }
    h1 { font-size: clamp(34px, 6vw, 60px); line-height: 1; letter-spacing: -.045em; margin: 24px 0 16px; }
    p { font-size: 19px; color: #6c594a; line-height: 1.55; margin: 0 0 28px; }
    .answers { display: grid; gap: 12px; }
    button {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(116, 84, 58, .2);
      border-radius: 18px;
      background: #fffaf1;
      color: #3d2c20;
      padding: 17px 18px;
      text-align: left;
      font: inherit;
      font-size: 17px;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, box-shadow .15s ease;
    }
    button:hover { transform: translateY(-2px); background: #fff3dc; box-shadow: 0 12px 30px rgba(80, 52, 32, .1); }
    .icon { font-size: 24px; width: 32px; text-align: center; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="inner">
      <div class="brand"><span class="bean"></span><span>Basecamp Coffee · Вопрос 2 из 6</span></div>
      <h1>Какой кофейный ритуал звучит как твой?</h1>
      <p>Мы подберём твою кофейную личность и пару напитков, которые стоит попробовать в местной Basecamp.</p>
      <section class="answers">
        <button><span class="icon">🌿</span><span>Медленное утро и чистый вкус без лишнего шума</span></button>
        <button><span class="icon">🍫</span><span>Мягкий сладкий момент, будто маленький праздник</span></button>
        <button><span class="icon">🌙</span><span>Крепкий заряд, когда день только начинается ночью</span></button>
        <button><span class="icon">🏡</span><span>Знакомая чашка, которая всегда возвращает на место</span></button>
      </section>
    </section>
  </main>
</body>
</html>
