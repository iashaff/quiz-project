<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Style Preview 2 — Минималистичный</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1f2933;
      background: #faf8f4;
      display: grid;
      place-items: center;
      padding: 48px 24px;
    }
    .shell { width: min(680px, 100%); }
    .progress {
      height: 6px;
      background: #e8e0d4;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 42px;
    }
    .progress span { display: block; height: 100%; width: 34%; background: #315c47; }
    .eyebrow { color: #7a6a5b; font-size: 14px; text-transform: uppercase; letter-spacing: .14em; }
    h1 { font-size: clamp(34px, 5vw, 54px); line-height: 1.05; letter-spacing: -.04em; margin: 12px 0 16px; }
    p { color: #5f6b63; font-size: 19px; line-height: 1.55; margin: 0 0 34px; }
    .answers { display: grid; gap: 12px; }
    button {
      width: 100%;
      border: 1px solid #ded6ca;
      border-radius: 16px;
      background: #ffffff;
      color: #233027;
      padding: 18px 20px;
      text-align: left;
      font: inherit;
      font-size: 17px;
      cursor: pointer;
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    }
    button:hover { border-color: #315c47; box-shadow: 0 12px 30px rgba(49, 92, 71, .12); transform: translateY(-1px); }
    .footer { margin-top: 28px; color: #988b7a; font-size: 14px; }
  </style>
</head>
<body>
  <main class="shell">
    <div class="progress"><span></span></div>
    <div class="eyebrow">Basecamp Coffee Quiz</div>
    <h1>Какой кофе подходит твоему ритму?</h1>
    <p>Ответь честно. Мы подберём кофейную личность и напитки, которые стоит попробовать.</p>
    <section class="answers">
      <button>Минимум шума. Максимум вкуса.</button>
      <button>Хочу что-то мягкое, тёплое и знакомое.</button>
      <button>Мне нужен заряд, желательно вчера.</button>
      <button>Иногда кофе должен быть десертом.</button>
    </section>
    <div class="footer">Вопрос 2 из 6</div>
  </main>
</body>
</html>
