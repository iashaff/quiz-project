<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Style Preview 3 — Смелый</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-serif, Georgia, Cambria, 'Times New Roman', serif;
      color: #f8efe3;
      background:
        linear-gradient(125deg, rgba(0,0,0,.8), rgba(0,0,0,.25)),
        radial-gradient(circle at 75% 20%, rgba(232, 121, 38, .75), transparent 32%),
        linear-gradient(135deg, #130b08, #2a120c 55%, #0d1010);
      display: grid;
      place-items: center;
      padding: 34px;
    }
    .card {
      width: min(760px, 100%);
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(19, 11, 8, .72);
      backdrop-filter: blur(12px);
      padding: 42px;
      box-shadow: 0 40px 100px rgba(0,0,0,.45);
    }
    .top { display: flex; justify-content: space-between; gap: 20px; color: #d8a35f; text-transform: uppercase; letter-spacing: .16em; font-size: 13px; }
    h1 { font-size: clamp(42px, 7vw, 82px); line-height: .9; letter-spacing: -.05em; margin: 28px 0 20px; }
    p { color: #d8c7b5; font-size: 20px; line-height: 1.5; max-width: 560px; }
    .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 32px; }
    button {
      min-height: 118px;
      border: 1px solid rgba(216, 163, 95, .55);
      background: rgba(255,255,255,.05);
      color: #f8efe3;
      padding: 20px;
      text-align: left;
      font: inherit;
      font-size: 18px;
      cursor: pointer;
      transition: background .16s ease, transform .16s ease, border-color .16s ease;
    }
    button:hover { background: rgba(216, 163, 95, .17); border-color: #f2b76b; transform: translateY(-3px); }
    @media (max-width: 640px) { .answers { grid-template-columns: 1fr; } .card { padding: 28px; } }
  </style>
</head>
<body>
  <main class="card">
    <div class="top"><span>Question 02</span><span>Find your roast</span></div>
    <h1>Когда день требует кофе, ты выбираешь...</h1>
    <p>Не думай слишком долго. Первый импульс обычно самый честный.</p>
    <section class="answers">
      <button>Чёрный, чистый, без компромиссов</button>
      <button>Сладкий, роскошный, почти десерт</button>
      <button>Кофеин с запасом на всю ночь</button>
      <button>Тёплая классика, которая всегда работает</button>
    </section>
  </main>
</body>
</html>
